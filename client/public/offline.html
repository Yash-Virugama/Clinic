<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Connection Unavailable</title>
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary: #0b0f19;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --bg-offwhite: #f8fafc;
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      color: var(--text-main);
      background-color: var(--bg-offwhite);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Grid background overlay */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, rgba(37, 99, 235, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(37, 99, 235, 0.02) 1px, transparent 1px);
      z-index: 0;
      pointer-events: none;
    }

    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.05);
      filter: blur(80px);
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      max-w: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.03);
      animation: card-appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes card-appear {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-wrapper {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: rgba(37, 99, 235, 0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      margin-bottom: 28px;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .icon-wrapper svg {
      width: 48px;
      height: 48px;
    }

    .offline-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 12px;
      background: rgba(239, 68, 68, 0.08);
      color: #ef4444;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      color: var(--secondary);
      line-height: 1.25;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 28px;
      background-color: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn:hover {
      background-color: var(--primary-hover);
      box-shadow: 0 12px 20px -3px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 24px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="icon-wrapper">
      <!-- Custom WiFi Off & Shield Medical Logo -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5" />
        <path d="M5 12.5a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <path d="M12 20h.01" />
      </svg>
    </div>

    <div>
      <div class="offline-badge">Offline Mode</div>
      <h1>Connection Lost</h1>
      <p>It looks like you're currently disconnected from the internet. Please check your network settings and try reloading the page.</p>
      
      <button class="btn" onclick="window.location.reload()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(0deg); transition: transform 0.5s;">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
        Try Again
      </button>
    </div>

    <div class="footer-note">
      You can still access precached pages of our application.
    </div>
  </div>

  <script>
    // Visual button rotation on click
    document.querySelector('.btn').addEventListener('click', function() {
      const svg = this.querySelector('svg');
      svg.style.transform = 'rotate(360deg)';
    });
  </script>
</body>
</html>
